spring.application.name=book-app

spring.datasource.url=jdbc:postgresql://localhost:5432/bookapp
spring.datasource.username=bookapp
spring.datasource.password=bookapp123

spring.jpa.hibernate.ddl-auto=none

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/db.changelog-master.yaml

server.error.include-message=always

spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.format_sql=true