<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Książek</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="glowny-header">
        <div class="kontener header-wewnatrz">
            <h1 class="logo">Katalog<span>Książek</span></h1>
            <nav class="menu-glowne">
                <button id="btn-lista" class="btn-menu">Katalog</button>
                <button id="btn-dodaj" class="btn-akcja">Dodaj Książkę</button>
            </nav>
        </div>
    </header>

<section id="sekcja-lista" class="karta-zawartosci">
            <h2 class="tytul-sekcji">Wszystkie Książki</h2>
            
            <div id="lista-ksiazek-kontener" class="siatka-ksiazek">
                </div>
        </section>

        <section id="sekcja-dodaj" class="karta-zawartosci" style="display: none;">
            <h2 class="tytul-sekcji">Dodaj nową książkę do bazy</h2>
            <form id="formularz-ksiazki">
                <div class="form-grupa">
                    <label for="tytul">Tytuł książki</label>
                    <input type="text" id="tytul" placeholder="np. Wiedźmin: Ostatnie życzenie" required>
                </div>

                <div class="form-grupa">
                    <label for="autor">Autor</label>
                    <input type="text" id="autor" placeholder="np. Andrzej Sapkowski" required>
                </div>

                <div class="form-grupa">
                    <label for="opis">Opis fabuły</label>
                    <textarea id="opis" rows="5" placeholder="Napisz krótko o czym jest ta książka..." required></textarea>
                </div>

                <button type="submit" id="btn-zapisz" class="btn-akcja btn-duzy">Zapisz książkę</button>
            </form>
        </section>

        <section id="sekcja-szczegoly" class="karta-zawartosci" style="display: none;">
            <button id="btn-powrot" class="btn-szary">🔙 Powrót do katalogu</button>
            
            <div class="szczegoly-ksiazki">
                <div class="okladka-placeholder">Brak okładki</div>
                <div class="info">
                    <h2 id="detale-tytul" class="tytul-ksiazki">Tytuł Książki</h2>
                    <h4 id="detale-autor" class="autor-ksiazki">Autor</h4>
                    <p id="detale-opis" class="opis-ksiazki">Opis książki pojawi się tutaj...</p>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
